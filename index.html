<!DOCTYPE html><html lang="en"><head><script defer="defer" src="kfh.js"></script></head><meta charset="UTF-8"><title>Key Font Helper</title><link rel="stylesheet" href="https://cwh.ca510.com/key-font/key_font.css"><div><label for="keyName"></label><select id="keyName"></select></div><div><label for="text"></label><textarea id="text"></textarea></div><div><div id="result"></div></div><script>const keyName=document.getElementById("keyName"),text=document.getElementById("text"),result=document.getElementById("result");window.onload=()=>{kfh.config.forEach((e=>{const t=document.createElement("option");t.value=e.keyName,t.innerText=e.fontName,keyName.appendChild(t)}))},keyName.onchange=text.oninput=function(){result.innerHTML=kfh.text2KeyFont(keyName.value,text.value)}</script></html>
